<div [class]="'theme-wrapper ' + (theme$ | async)">

  <mat-sidenav-container>

        <span data-testid="title">{{ 'eus.title.short' | translate}}</span></div>

          routerLinkActive="active">

      </mat-nav-list>

    -->
    <mat-sidenav #sidenav mode="side" *ngIf="(isAuthenticated$ | async)">
      <div class="branding"><img [src]="logo" />
        <span data-testid="title">{{ 'eus.title.short' | translate }}</span>
      </div>
      <mat-nav-list>
          <a mat-list-item *ngFor="let item of navigationSideMenu" (click)="sidenav.close()" [routerLink]="[item.link]"
            routerLinkActive="active">
            {{item.label | translate}}
          </a>
        </mat-nav-list>
    </mat-sidenav>

    <div class="wrapper">

      <div class="toolbar" [style.position]="(stickyHeader$ | async) ? 'fixed' : 'inherit'" [class.mat-elevation-z4]="(stickyHeader$ | async)" 
      *ngIf="(isAuthenticated$ | async)">
        <mat-toolbar color="primary">
          <button mat-icon-button class="d-md-none" (click)="sidenav.toggle()">
            <fa-icon icon="bars"></fa-icon>

          </button>

          <span routerLink="" class="branding spacer center d-inline d-sm-none">
            <img [src]="logo" /></span>
          <span routerLink="" class="branding spacer center d-none d-sm-inline d-md-none"><img [src]="logo" /> {{
            'eus.title.short' | translate }}</span>
          <span routerLink="" class="branding spacer d-none d-md-inline"><img [src]="logo" /> {{ 'eus.title.long' | translate
            }}</span>

        </mat-toolbar>
      </div>

      <div class="content" [@routeAnimations]="o.isActivated && o.activatedRoute.routeConfig.path">
        <div class="router">
          <router-outlet #o="outlet"></router-outlet>
        </div>
      </div>

      <div class="footer" *ngIf="(isAuthenticated$ | async)">
        <div class="row">
          <div class="col-12 signature">
            &#169; <span class="year" data-testid="footer-year">{{year}}</span> - Bharathikannan Ilanchezhiyan
            <br class="d-block d-sm-none">
            <a [matTooltip]="'eus.footer.changelog' | translate"
               matTooltipPosition="before">
              <fa-icon icon="rocket"></fa-icon>
              {{version}} <span *ngIf="!isProd">[{{envName}}]</span>
            </a>
          </div>
        </div>
      </div>
    </div>
  </mat-sidenav-container>
  <ng-http-loader backgroundColor="#3f51b5" spinner="sk-three-bounce"></ng-http-loader>
</div>
